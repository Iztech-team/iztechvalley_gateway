{% extends "templates/web.html" %}

{% block page_content %}
<div style="text-align: center; padding: 4rem; max-width: 500px; margin: 0 auto;">
    {% if error %}
        <div style="background-color: #fee2e2; border: 1px solid #fecaca; border-radius: 0.5rem; padding: 2rem;">
            <h2 style="color: #dc2626; margin-top: 0;">❌ Authentication Failed</h2>
            <p style="color: #4b5563;">{{ message }}</p>
        </div>
    {% else %}
        <div style="background-color: #dcfce7; border: 1px solid #bbf7d0; border-radius: 0.5rem; padding: 2rem;">
            <h2 style="color: #16a34a; margin-top: 0;">✅ Login Successful</h2>
            <p style="color: #4b5563;">Redirecting to your workspace...</p>
            <meta http-equiv="refresh" content="1;url=/app">
        </div>
    {% endif %}
    <p style="margin-top: 2rem;">
        <a href="/login" style="color: #3b82f6; text-decoration: none;">← Back to Login</a>
    </p>
</div>
{% endblock %}
