{% extends "templates/web.html" %}

{% block page_content %}
<style>
    .container {
        max-width: 800px;
        margin: 3rem auto;
        padding: 2rem;
    }
    h2 {
        text-align: center;
        margin-bottom: 2rem;
    }
    .site-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 1rem;
    }
    .site-card {
        padding: 1.5rem;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
    }
    .site-card:hover {
        border-color: #2563eb;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
        transform: translateY(-2px);
    }
    .site-name {
        font-size: 1.1rem;
        font-weight: 600;
        color: #1f2937;
    }
    .site-domain {
        font-size: 0.85rem;
        color: #6b7280;
        margin-top: 0.25rem;
    }
</style>

<div class="container">
    <h2>Choose a workspace</h2>
    <div id="sites" class="site-grid"></div>
</div>

<script>
    const sites = JSON.parse(sessionStorage.getItem('accessible_sites') || '[]');
    const credentials = JSON.parse(sessionStorage.getItem('user_credentials') || '{}');
    
    if (sites.length === 0) {
        window.location.href = '/sso_login_page';
    }
    
    const container = document.getElementById('sites');
    
    sites.forEach(site => {
        const card = document.createElement('div');
        card.className = 'site-card';
        card.innerHTML = `
            <div class="site-name">${site.site_name}</div>
            <div class="site-domain">${site.domain}</div>
        `;
        card.addEventListener('click', () => {
            window.location.href = `//${site.domain}/sso_login?usr=${encodeURIComponent(credentials.usr)}&pwd=${encodeURIComponent(credentials.pwd)}`;
        });
        container.appendChild(card);
    });
</script>
{% endblock %}
